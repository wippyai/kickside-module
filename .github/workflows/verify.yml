name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

env:
  WIPPY_VERSION: v0.3.25a

jobs:
  module:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: acme_test_starter
          POSTGRES_USER: kickside
          POSTGRES_PASSWORD: kickside
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U kickside -d acme_test_starter"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install verified Wippy CLI
        shell: bash
        run: |
          set -euo pipefail
          base="https://github.com/wippyai/runtime/releases/download/${WIPPY_VERSION}"
          curl -fsSLO "${base}/wippy-linux-amd64"
          curl -fsSLO "${base}/SHA256SUMS"
          grep ' wippy-linux-amd64$' SHA256SUMS | sha256sum -c -
          sudo install -m 0755 wippy-linux-amd64 /usr/local/bin/wippy
          wippy version

      - name: Verify SQLite, registry, and frontend
        run: make verify

      - name: Verify PostgreSQL
        run: make test-pg

      - name: Generated artifacts are reproducible
        run: git diff --exit-code
