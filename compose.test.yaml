services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: acme_test_starter
      POSTGRES_USER: kickside
      POSTGRES_PASSWORD: kickside
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kickside -d acme_test_starter"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
